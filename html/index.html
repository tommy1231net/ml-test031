<!DOCTYPE html>
<html lang="ja">
<head>
    <title>ML Demo: Next Product Recommender</title>
    <meta charset="utf-8">
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; margin: 2em; background-color: #f0f2f5; color: #333; }
        .container { max-width: 650px; margin: auto; background: white; padding: 2.5em; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h2 { color: #1a1a1a; border-bottom: 3px solid #ff4757; padding-bottom: 12px; margin-top: 0; }
        p { color: #666; font-size: 0.95em; line-height: 1.6; }
        .section-title { font-size: 1.1em; font-weight: bold; margin: 20px 0 10px; color: #ff4757; border-left: 4px solid #ff4757; padding-left: 10px; }
        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .input-group { margin-bottom: 15px; }
        .input-group.full { grid-column: span 2; }
        label { display: block; margin-bottom: 6px; font-size: 0.85em; font-weight: bold; color: #444; }
        input, select { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
        input:focus, select:focus { border-color: #ff4757; outline: none; box-shadow: 0 0 0 2px rgba(255, 71, 87, 0.1); }
        button { margin-top: 25px; padding: 15px; width: 100%; cursor: pointer; background-color: #2f3542; color: white; border: none; border-radius: 6px; font-size: 1.1em; font-weight: bold; transition: background 0.3s; }
        button:hover { background-color: #ff4757; }
        
        /* 実行結果のスタイル */
        #result { margin-top: 25px; padding: 20px; border-radius: 8px; display: none; border: 1px solid #eee; }
        .recommendation-box { text-align: center; padding: 15px; background: #fff; border: 2px dashed #ff4757; border-radius: 8px; margin-bottom: 15px; }
        .rec-label { font-size: 1.4em; color: #ff4757; font-weight: bold; }
        .strategy-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; background: #eee; font-size: 0.75em; color: #666; margin-top: 5px; }
        .detail-table { width: 100%; font-size: 0.85em; border-collapse: collapse; margin-top: 10px; }
        .detail-table th, .detail-table td { text-align: left; padding: 8px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🛍️ TheLook: <span style="color: #ff4757;">Next Item Predictor</span></h2>
        <p>現在の閲覧商品とユーザー属性から、次に購入される可能性が高いカテゴリを予測します。</p>

        <div class="section-title">Current Product Context</div>
        <div class="input-grid">
            <div class="input-group">
                <label for="input_category">Category:</label>
                <select id="input_category">
                    <option value="Tops & Tees">Tops & Tees</option>
                    <option value="Jeans">Jeans</option>
                    <option value="Dresses">Dresses</option>
                    <option value="Accessories">Accessories</option>
                    <option value="Swim">Swim</option>
                    <option value="Sweaters">Sweaters</option>
                    <option value="Underwear">Underwear</option>
                </select>
            </div>
            <div class="input-group">
                <label for="input_price">Price ($):</label>
                <input type="number" id="input_price" value="45.00">
            </div>
            <div class="input-group">
                <label for="input_brand">Brand:</label>
                <input type="text" id="input_brand" value="Diesel">
            </div>
            <div class="input-group">
                <label for="input_department">Department:</label>
                <select id="input_department">
                    <option value="Men">Men</option>
                    <option value="Women">Women</option>
                </select>
            </div>
        </div>

        <div class="section-title">User Demographics</div>
        <div class="input-grid">
            <div class="input-group">
                <label for="age">Age:</label>
                <input type="number" id="age" value="28">
            </div>
            <div class="input-group">
                <label for="gender">Gender:</label>
                <select id="gender">
                    <option value="M">Male</option>
                    <option value="F">Female</option>
                </select>
            </div>
            <div class="input-group full">
                <label for="country">Country:</label>
                <input type="text" id="country" value="Japan">
            </div>
        </div>

        <button onclick="predict()">予測とおすすめを表示</button>

        <div id="result"></div>
    </div>

    <script>
        async function predict() {
            const resultDiv = document.getElementById('result');
            const url = "https://ml-test031-api-1010720561963.asia-northeast1.run.app/predict";
            
            resultDiv.style.display = "block";
            resultDiv.innerHTML = "⏳ AI Analyzing user behavior...";
            resultDiv.style.backgroundColor = "#f8f9fa";
            
            const data = {
                input_category: document.getElementById('input_category').value,
                input_price: parseFloat(document.getElementById('input_price').value) || 0,
                input_brand: document.getElementById('input_brand').value,
                input_department: document.getElementById('input_department').value,
                age: parseInt(document.getElementById('age').value) || 0,
                gender: document.getElementById('gender').value,
                country: document.getElementById('country').value
            };
        
            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (!res.ok) throw new Error("API Connection Failed");
                
                const result = await res.json();

                let html = `<div class="recommendation-box">`;
                html += `<div style="font-size: 0.9em; color: #666;">Recommended Category:</div>`;
                html += `<div class="rec-label">${result.recommended_category}</div>`;
                html += `<div class="strategy-badge">Logic: ${result.strategy}</div>`;
                html += `</div>`;

                html += `<table class="detail-table">`;
                html += `<tr><th>Rank</th><th>Category</th><th>Probability</th></tr>`;
                html += `<tr><td>1st</td><td>${result.details.rank1.category}</td><td>${(result.details.rank1.prob * 100).toFixed(1)}%</td></tr>`;
                html += `<tr><td>2nd</td><td>${result.details.rank2.category}</td><td>${(result.details.rank2.prob * 100).toFixed(1)}%</td></tr>`;
                html += `</table>`;
                
                resultDiv.innerHTML = html;
                resultDiv.style.backgroundColor = "#ffffff";
                
            } catch (error) {
                console.error("Error:", error);
                resultDiv.innerText = "Error: " + error.message;
                resultDiv.style.color = "#d63031";
                resultDiv.style.backgroundColor = "#fff5f5";
            }
        }
    </script>
</body>
</html>
